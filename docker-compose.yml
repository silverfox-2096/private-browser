# Private browser stack: Firefox in a container whose ONLY network path is a
# WireGuard VPN tunnel (via Gluetun). If the tunnel drops, Firefox has no route
# anywhere -- not even your LAN. See README.md.

services:
  gluetun:
    # Pinned by digest for reproducibility. v3.40 on purpose: the control-server
    # route changed after v3.40 (see README). Bump the tag and digest together.
    image: qmcgaw/gluetun:v3.40@sha256:e10584de1f82d8999e5e6c3111901d9d56a2eed21151fb96af060f390bbdfba8
    container_name: gluetun-proton
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: protonvpn   # any Gluetun-supported provider works
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      SERVER_COUNTRIES: Singapore        # change to your preferred exit country
      FIREWALL: "on"
      FIREWALL_OUTBOUND_SUBNETS: ""       # blocks the LAN too -> total kill switch
      DOT: "on"
      DOT_PROVIDERS: cloudflare
      BLOCK_MALICIOUS: "off"              # ON can break DNS on some providers; see README
      HEALTH_VPN_DURATION_INITIAL: 30s
    # No healthcheck override on purpose: Gluetun's built-in healthcheck actually
    # tests tunnel connectivity. A custom wget against the control server would only
    # prove the HTTP server is up (it returns 200 even when the tunnel is down).
    ports:
      - "127.0.0.1:7814:5800"   # VNC web UI (localhost only)
    volumes:
      - ./gluetun:/gluetun

  firefox:
    build:
      context: .
      dockerfile: Dockerfile.firefox
    image: private-firefox:fonts
    container_name: private-firefox
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy   # never starts before the tunnel is up
    network_mode: "service:gluetun"  # borrows Gluetun's netns; no network of its own
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: Etc/UTC                    # container logs only; RFP forces the JS-visible TZ to UTC
      USER_ID: 1000
      GROUP_ID: 1000
      DISPLAY_WIDTH: 1920
      DISPLAY_HEIGHT: 1080
      SECURE_CONNECTION: 1
      VNC_PASSWORD: ${VNC_PASSWORD}
      FF_OPEN_URL: about:blank       # set to https://ipinfo.io/json for an IP check on launch
      # Hardening is intentionally minimal: RFP + the tmpfs/namespace architecture do the
      # work here, not a long user.js. See the README design notes.
      FF_PREF_RFP: "privacy.resistFingerprinting=true"
      FF_PREF_LETTERBOX: "privacy.resistFingerprinting.letterboxing=true"
      FF_PREF_WEBGL: "webgl.disabled=true"
      FF_PREF_TELEMETRY: "toolkit.telemetry.enabled=false"
      FF_PREF_DATAREPORT: "datareporting.healthreport.uploadEnabled=false"
      FF_PREF_PREFETCH: "network.prefetch-next=false"
      FF_PREF_SPECULATE: "network.http.speculative-parallel-limit=0"
      FF_PREF_SEARCHSUGGEST: "browser.search.suggest.enabled=false"
    # No host volume: downloads land in the tmpfs profile and are wiped on stop,
    # like the rest of the profile. This is deliberate -- the stack is amnesic.
    tmpfs:
      - "/config:size=512m,uid=1000,gid=1000,mode=0755"   # ephemeral profile; keep the quotes

  # Optional self-hosted CreepJS fingerprint tester. Disabled by default.
  # Enable:  docker compose --profile test up -d creepjs
  # Populate ./creepjs/docs with a CreepJS build first (see README).
  # The container browser reaches it at http://localhost:8080 inside Gluetun's
  # namespace -- no host port publish is needed for that.
  creepjs:
    image: nginx:alpine
    container_name: creepjs-server
    profiles: ["test"]
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
    network_mode: "service:gluetun"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./creepjs/docs:/usr/share/nginx/html:ro
      - ./nginx-8080.conf:/etc/nginx/conf.d/default.conf:ro
